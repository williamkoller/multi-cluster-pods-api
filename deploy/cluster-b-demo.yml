apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpbin-demo
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: httpbin-demo
  template:
    metadata:
      labels:
        app: httpbin-demo
    spec:
      containers:
        - name: httpbin
          image: kennethreitz/httpbin
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: httpbin-demo
  namespace: default
spec:
  selector:
    app: httpbin-demo
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP